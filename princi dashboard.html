<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Principal Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#4f46e5,#7c3aed,#9333ea);
min-height:100vh;
padding:30px;
color:white;
}

h1{
text-align:center;
margin-bottom:30px;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:30px;
}

.stat-box{
background:rgba(255,255,255,0.12);
padding:25px;
border-radius:20px;
backdrop-filter:blur(10px);
text-align:center;
box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

.stat-box h2{
font-size:36px;
margin-bottom:10px;
}

.insight-box{
background:rgba(255,255,255,0.12);
padding:25px;
border-radius:20px;
margin-bottom:30px;
backdrop-filter:blur(10px);
box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

.insight-box h2{
margin-bottom:15px;
}

.chart-box{
width:420px;
height:420px;
background:white;
border-radius:20px;
padding:20px;
margin:30px auto;
}

.feedback-container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:20px;
margin-top:20px;
}

.card{
background:rgba(255,255,255,0.12);
padding:20px;
border-radius:20px;
backdrop-filter:blur(10px);
box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

.card h3{
margin-bottom:10px;
}

.card p{
margin-bottom:10px;
line-height:1.5;
}

.status{
display:inline-block;
background:limegreen;
padding:8px 15px;
border-radius:20px;
font-weight:bold;
}

.empty{
text-align:center;
font-size:22px;
margin-top:40px;
}

.activity{
background:rgba(255,255,255,0.12);
padding:25px;
border-radius:20px;
margin-top:30px;
backdrop-filter:blur(10px);
box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

.activity h2{
margin-bottom:15px;
}

.activity ul{
padding-left:20px;
}

.activity li{
margin-bottom:10px;
}

</style>

</head>

<body>

<h1>🎓 Principal Dashboard</h1>

<div class="stats">

<div class="stat-box">
<h2 id="totalFeedback">0</h2>
<p>Total Feedback</p>
</div>

<div class="stat-box">
<h2 id="approvedCount">0</h2>
<p>Approved</p>
</div>

<div class="stat-box">
<h2 id="rejectedCount">0</h2>
<p>Rejected</p>
</div>

<div class="stat-box">
<h2 id="topDepartment">-</h2>
<p>Most Active Department</p>
</div>

</div>

<div class="insight-box">

<h2>🤖 AI Summary</h2>

<p id="aiSummary"></p>

<br>

<p id="insight1"></p>
<p id="insight2"></p>
<p id="insight3"></p>

</div>

<div class="chart-box">

<canvas id="myChart"></canvas>

</div>

<h2>✅ Approved Feedback</h2>

<div class="feedback-container"
id="feedbackContainer">

</div>

<div class="activity">

<h2>🕒 Recent Activity</h2>

<ul id="recentActivity">

</ul>

</div>

<script>

let allFeedback =
JSON.parse(localStorage.getItem("campusvoice")) || [];

let approved =
allFeedback.filter(item=>item.status==="Approved");

let rejected =
allFeedback.filter(item=>item.status==="Rejected");

let teachingCount =
allFeedback.filter(item=>item.category==="Teaching Quality").length;

let complaintCount =
allFeedback.filter(item=>item.category==="Complaint").length;

let suggestionCount =
allFeedback.filter(item=>item.category==="Suggestion").length;

let appreciationCount =
allFeedback.filter(item=>item.category==="Appreciation").length;

let wellbeingCount =
allFeedback.filter(item=>item.category==="Well-being").length;
let deptCount={};

allFeedback.forEach(item=>{

if(deptCount[item.department]){

deptCount[item.department]++;

}

else{

deptCount[item.department]=1;

}

});

let topDept="-";
let max=0;

for(let dept in deptCount){

if(deptCount[dept]>max){

max=deptCount[dept];
topDept=dept;

}

}

document.getElementById("totalFeedback").innerText=
allFeedback.length;

document.getElementById("approvedCount").innerText=
approved.length;

document.getElementById("rejectedCount").innerText=
rejected.length;

document.getElementById("topDepartment").innerText=
topDept;

/* AI SUMMARY */

let summary="";

if(appreciationCount>=complaintCount){

summary+="Most students appreciate the faculty and campus environment. ";

}

if(complaintCount>0){

summary+="Some complaints were raised regarding hostel facilities, Wi-Fi and campus services. ";

}

if(suggestionCount>0){

summary+="Students provided valuable suggestions for institutional improvement. ";

}

if(teachingCount>0){

summary+="Teaching quality continues to be one of the major discussion areas. ";

}

if(wellbeingCount>0){

summary+="Student well-being has also been highlighted. ";

}

if(summary===""){

summary="No feedback available.";

}

document.getElementById("aiSummary").innerText=
summary;

document.getElementById("insight1").innerText=
"📌 Most Active Department : "+topDept;

document.getElementById("insight2").innerText=
"📚 Teaching Feedback : "+teachingCount;

document.getElementById("insight3").innerText=
"💡 Suggestions : "+suggestionCount+
" | Complaints : "+complaintCount;

/* APPROVED FEEDBACK */

let feedbackContainer=
document.getElementById("feedbackContainer");

if(approved.length===0){

feedbackContainer.innerHTML=`
<div class="empty">
No Approved Feedback Available
</div>
`;

}

else{

approved.forEach(item=>{

feedbackContainer.innerHTML+=`

<div class="card">

<h3>${item.category}</h3>

<p>
<b>Department :</b>
${item.department}
</p>

<p>
<b>Feedback :</b><br>
${item.feedback}
</p>

<p>

<span class="status">

${item.status}

</span>

</p>

</div>

`;

});

}

/* RECENT ACTIVITY */

let recent=
document.getElementById("recentActivity");

allFeedback.slice(-5).reverse().forEach(item=>{

recent.innerHTML+=`

<li>

${item.department}

submitted

${item.category}

(${item.status})

</li>

`;

});

/* PIE CHART */

const ctx=
document.getElementById("myChart");

new Chart(ctx,{

type:"pie",

data:{

labels:[
"Teaching",
"Complaint",
"Suggestion",
"Appreciation",
"Well-being"
],

datasets:[{

data:[

teachingCount,

complaintCount,

suggestionCount,

appreciationCount,

wellbeingCount

]

}]

}

});

</script>

</body>
</html>
